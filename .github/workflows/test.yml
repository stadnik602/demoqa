name: Python Selene Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Проверка репозитория
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Установка Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3️⃣ Установка зависимостей
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium selene pytest pytest-allure-adaptor allure-pytest webdriver-manager

      # 4️⃣ Установка Chrome
      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      # 5️⃣ Запуск тестов с Allure
      - name: Run pytest
        run: |
          mkdir -p steps/allure-results
          pytest --alluredir=steps/allure-results

      # 6️⃣ Скачивание Allure для генерации отчета
      - name: Install Allure
        run: |
          sudo apt-add-repository ppa:qameta/allure -y
          sudo apt-get update
          sudo apt-get install -y allure

      # 7️⃣ Генерация и публикация отчета Allure
      - name: Generate Allure report
        run: |
          allure generate steps/allure-results -o steps/allure-report --clean
          allure open -p 8080 steps/allure-report
